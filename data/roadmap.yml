# Build-in-public roadmap as data. Rendered to docs/ROADMAP.md + README summary.
# A sequenced arc: Act I (Days 1–90) = computational credibility on OPEN data, no wet lab;
# Act II (Days 91–180) = use that + the credential network to bridge to real wet-lab
# validation and an incorporated, fundable company.
# Three tracks every week: Knowledge (ramp fast, verify vs primary sources),
# Tooling (ship code each turn, gated), Connections (artifact-in-hand outreach).
tracks:
  - "🧠 Knowledge — ramp on aging biology fast; verify every claim against a primary paper (TRUE = evidenced)."
  - "🛠️ Tooling — each week ships runnable, gated code (the loop); cheap fine-tunes on Tinker/Modal."
  - "🤝 Connections — build in public; reach the hubs + people with an artifact in hand, never empty-handed. In Act II this is the bridge: the credential network (Genentech, Yale/Levine, Georgia Tech) turns computation into bench access, then a raise."

phases:
  - id: p1
    title: "Phase 1 — Foundation & First Signal"
    days: "Days 1–30"
    theme: "Stand up the loop, ramp on aging biology, ship the first VERIFIABLE result."
    weeks:
      - week: 1
        knowledge: "Map the field (this repo = your knowledge base). Learn the hallmarks of aging + how epigenetic clocks work; verify vs López-Otín hallmarks + Horvath 2013."
        tooling: "Init the loop repo; reproduce a methylation age clock with `pyaging` on an open GEO dataset (no wet lab). First green `make check`."
        connections: "Launch build-in-public: repo + an honest intro thread. Join VitaDAO Discord + subscribe to Longevity Marketcap."
      - week: 2
        knowledge: "The clock zoo — PhenoAge, GrimAge, DunedinPACE — and the biomarkers-of-aging framing."
        tooling: "Pull the Biomarkers of Aging Challenge data via Biolearn; submit a baseline → FIRST leaderboard entry."
        connections: "Engage 5 approachable, AI-forward researchers with the artifact in hand: de Magalhães, Zhavoronkov, Kaeberlein, Andrew Steele, Fedichev."
      - week: 3
        knowledge: "Single-cell aging: Tabula Muris Senis + CELLxGENE Census; what a cell-level aging signature is."
        tooling: "Reproduce a single-cell aging signature; ship a tiny open tool (a clean notebook / pyaging wrapper)."
        connections: "Apply to a Foresight monthly grant + VitaDAO/VitaLabs fellowship (both open to independents)."
      - week: 4
        knowledge: "Write the first explainer (living-knowledge) + an infographic (animate-anything): 'how aging clocks work.'"
        tooling: "Improve the leaderboard baseline (feature engineering / an ElasticNet-vs-deep clock)."
        connections: "Publish the explainer where the audience is (Lifespan.io); recap week-4 progress thread."
    milestone: "GATE 1 — public repo live · ≥1 leaderboard submission · first grant application in · 5 researcher touches."

  - id: p2
    title: "Phase 2 — Differentiated Result & Momentum"
    days: "Days 31–60"
    theme: "A genuine finding on OPEN data + an adopted open tool + a real collaborator."
    weeks:
      - week: "5–6"
        knowledge: "Bio foundation models: how Geneformer / scGPT are trained + fine-tuned; in-silico perturbation."
        tooling: "Fine-tune an open bio-FM (Geneformer/scGPT) via Tinker/Modal on an aging task; run the research-loop (hypothesis→analysis→verify→write-up) → a real finding on public data."
        connections: "Secure 1 academic collaborator by offering to co-analyze their public/soon-public data."
      - week: 7
        knowledge: "Proteomic organ-aging clocks (Wyss-Coray) — a second, orthogonal modality."
        tooling: "Ship a genuinely useful, pip-installable open tool a lab could adopt; climb the leaderboard."
        connections: "Route the tool through the hubs (Longevity Marketcap orbit, VitaDAO); ask for one intro each."
      - week: 8
        knowledge: "Synthesize: a 'state of AI × aging clocks' living-knowledge piece."
        tooling: "Harden the tool (tests + docs) so it's trustworthy; second research-loop turn."
        connections: "Show up at a community event (Vitalist Bay / Foresight workshop / ARDD) with the tool + finding."
    milestone: "GATE 2 — a reproducible finding write-up · an open tool with ≥1 external user · 1 named collaborator · a micro-grant funded OR strong grant progress."

  - id: p3
    title: "Phase 3 — Credibility & Leverage"
    days: "Days 61–90"
    theme: "Convert signal into a preprint, non-dilutive funding, and a deliberate fork in the road."
    weeks:
      - week: "9–10"
        knowledge: "Write for peers: methods, threats-to-validity, reproducibility — scientist-grade."
        tooling: "Preprint / technical report on bioRxiv (or a top-decile leaderboard finish); an animate-anything explainer of the result."
        connections: "Give a talk / go on a podcast (Longevity Marketcap, Lifespan.io); publish the preprint thread."
      - week: 11
        knowledge: "Map the funding + partnership fit to your actual status (independent → VitaDAO/Foresight; PI-gated → partner in)."
        tooling: "Package everything into a clean portfolio artifact (the repo + preprint + tool + leaderboard)."
        connections: "Close a VitaDAO/Foresight micro-grant; line up an academic lab partnership (SBIR path if incorporating)."
      - week: 12
        knowledge: "Retro: what compounded, what to do next-90 (write it in public)."
        tooling: "Ship the v2 loop with everything learned baked in."
        connections: "Commit to the sequenced path (comp → wet-lab → company): lock the lab partnership that becomes Act II, and prep the age1 application — decide from the pull you generated, not from a standing start."
    milestone: "GATE 3 — a preprint OR top-decile leaderboard · non-dilutive funding · a named collaborator · a lab partnership lined up for Act II."

  - id: p4
    title: "Act II — Wet-lab validation & spin-out"
    days: "Days 91–180 (Months 4–6)"
    theme: "Sequenced bridge: convert the computational finding + your credential network (Genentech, Yale/Levine orbit, Georgia Tech) into a lab-validated result, then an incorporated, fundable company. Full-time, raise-ready."
    weeks:
      - week: "13–15"
        knowledge: "The translational gap — what makes a computational aging finding wet-lab-testable: assay design, cell/mouse models, and what an academic lab vs a CRO can actually run."
        tooling: "Turn the validated computational finding into ONE crisp, pre-registered wet-lab hypothesis + protocol; package your analysis as the 'dry' half of a joint dry+wet study a partner can execute."
        connections: "Activate the network for the PARTNERSHIP (not just a chat): warm-intro a Yale lab (Levine orbit) + a Genentech-alum PI/team; pitch 'I bring the computation + the funding legwork, you bring the bench' → secure 1 lab partnership with bench access."
      - week: "16–20"
        knowledge: "Rigor + IP hygiene from your Genentech side: GLP-ish standards, freedom-to-operate, what a sponsored-research vs collaboration agreement gives you."
        tooling: "Run the joint dry+wet study: the partner lab executes the assay, you own the analysis → FIRST real wet-lab validation (or a clean, honest null) of your computational hypothesis."
        connections: "Unlock PI-gated funding through the partnership (Impetus / Hevolution); convert the result into a co-authored preprint; recruit a wet-lab-capable co-founder from the Genentech/Yale network."
      - week: "21–24"
        knowledge: "Company formation for a dry+wet longevity startup: the wedge (your computational platform as the moat), the milestone-based ask, what a pre-seed actually funds."
        tooling: "Incorporate; assemble the founding artifact — the computational platform + the lab-validated finding + the working dry→wet loop as proof, not a promise."
        connections: "Raise-ready: apply to age1 (Deming) and raise a pre-seed on your track record + Genentech network; convert the lab partnership into a founding collaboration or sponsored-research deal."
    milestone: "GATE 4 — a lab-validated (or cleanly null) finding · a co-authored preprint · an incorporated entity + a wet-lab co-founder · age1 acceptance OR a pre-seed raise underway."

# Momentum markers — the signal ladder (each rung recruits the next).
signal_ladder:
  - "Public repo + honest launch thread"
  - "First open-leaderboard submission (code-only, credibility-gated)"
  - "A reproduced aging clock + a shipped open tool"
  - "A fine-tuned bio-FM finding on open data (research-loop write-up)"
  - "A named academic/industry collaborator"
  - "Non-dilutive micro-grant (VitaDAO / Foresight)"
  - "A preprint or top-decile leaderboard finish"
  - "A lab partnership (dry+wet): your computation earns bench access + co-authorship"
  - "A wet-lab-validated (or cleanly null) finding with the partner lab"
  - "An incorporated company + a wet-lab co-founder from the network"
  - "age1 acceptance or a pre-seed raise — the sequenced fork taken: build the company"
