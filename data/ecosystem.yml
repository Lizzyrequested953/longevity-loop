# Funding, community, conferences, media — where signal + connections compound.
# type: grant | fellowship | community | accelerator | conference | media.
# open_to_independents flags the realistic on-ramps for a solo AI-native builder.
- { name: "Biomarkers of Aging Challenge / Longevity Prize", type: grant, url: "https://www.longevityprize.com/prize/biomarker", open_to_independents: true, note: "Open, code-only competition + curated dataset (Biolearn) — the IDEAL first credibility-gated signal, no wet lab." }
- { name: "VitaDAO / VitaLabs", type: community, url: "https://www.vitadao.com/", open_to_independents: true, note: "DeSci collective; fast fellowship grants (~$65K), light application, active Discord — most accessible funding+community on-ramp." }
- { name: "Foresight Institute — Longevity Grants", type: grant, url: "https://foresight.org/engage/grants/", open_to_independents: true, note: "Monthly-deadline frontier grants (AI-for-science + longevity), unusually open to non-traditional applicants." }
- { name: "Foresight Fellowship", type: fellowship, url: "https://foresight.org/engage/fellowship/", open_to_independents: true, note: "Year-long fellowship; mentorship + intros to funders/senior scientists; global, independent-friendly." }
- { name: "Longevity Biotech Fellowship (LBF)", type: fellowship, url: "https://longbiofellowship.org/", open_to_independents: true, note: "The main 'how do I get into longevity biotech' front door (ODLB merged in); cohort + retreat + community." }
- { name: "age1", type: accelerator, url: "https://age1.com/", open_to_independents: true, note: "Laura Deming's longevity accelerator (~$500K, 4-mo). Dilutive — the premier founder on-ramp; apply with a public track record." }
- { name: "Impetus Longevity Grants (Norn Group)", type: grant, url: "https://impetusgrants.org/", open_to_independents: false, note: "Fast $10K-$500K aging-science grants (~3-4 wk decisions) — PI/lab-gated; partner into a lab to access." }
- { name: "Hevolution Foundation", type: grant, url: "https://hevolution.com/grants", open_to_independents: false, note: "Large geroscience funder ($300-500K/yr); institutional/PI-gated — a funder to partner toward." }
- { name: "XPRIZE Healthspan", type: grant, url: "https://www.xprize.org/prizes/healthspan", open_to_independents: false, note: "$101M team competition (restore function 10-20 yrs). Team/clinical — highest-leverage as a rallying point + network." }
- { name: "NIA (NIH)", type: grant, url: "https://www.nia.nih.gov/research/grants-funding", open_to_independents: false, note: "Largest US non-dilutive aging funder; SBIR/STTR is the realistic founder path once incorporated." }
- { name: "Astera Institute (Rejuvenome)", type: grant, url: "https://astera.org/", open_to_independents: false, note: "Runs the open ~$70M combinatorial mouse-lifespan dataset — build on it as open data; grants are relationship-driven." }
- { name: "Vitalist Bay / Vitalism", type: community, url: "https://vitalistbay.com/", open_to_independents: true, note: "Longevity pop-up city — the highest-density in-person gathering of the frontier/independent crowd." }
- { name: "Aging Research & Drug Discovery (ARDD)", type: conference, url: "https://agingpharma.org/", open_to_independents: true, note: "The top translational-geroscience conference (Copenhagen) — where the serious science+investor crowd is." }
- { name: "Longevity Summit Dublin", type: conference, url: "https://longevitysummitdublin.com/", open_to_independents: true, note: "Rejuvenation-biotech heavy (de Grey/O'Dea); researchers + advocates + investors." }
- { name: "Longevity Marketcap (Nathan Cheng)", type: media, url: "https://longevitymarketcap.com/", open_to_independents: true, note: "Most-read industry newsletter; Cheng is a hub node (LBF, Vitalism, Healthspan Capital) — engage to map who's who." }
- { name: "Lifespan.io", type: media, url: "https://lifespan.io/", open_to_independents: true, note: "Advocacy + news non-profit — a place to get build-in-public work amplified to an engaged audience." }
- { name: "Longevity.Technology", type: media, url: "https://longevity.technology/", open_to_independents: true, note: "Daily industry/investment newsletter — track funding rounds + deal-flow signals." }
