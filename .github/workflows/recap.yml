name: recap
# End-of-day recap: if the day moved, write a viral-quality explainer + RSS item,
# then commit them. pages.yml redeploys site/** on the push, and the portfolio's
# Writing section pulls the RSS feed (category "longevity-loop") on its own cron.
on:
  schedule:
    - cron: "0 23 * * *" # 23:00 UTC daily — "end of day"
  workflow_dispatch: {}
permissions:
  contents: write
  actions: write # to dispatch pages.yml (a GITHUB_TOKEN push can't trigger it)
concurrency: { group: recap, cancel-in-progress: false }
jobs:
  recap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 } # need history for the "what moved today" window
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install anthropic pyyaml
      - name: Generate the daily recap (signal-gated)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          SINCE=$(git rev-list -1 --before="1 day ago" HEAD || true)
          DATE=$(date -u +%F)
          python3 scripts/recap.py --date "$DATE" --since "$SINCE"
      - name: Commit + deploy if a recap was written
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "$(git status --porcelain site/writings site/feed.xml)" ]; then
            git config user.name "recap-bot"
            git config user.email "recap-bot@users.noreply.github.com"
            git add site/writings site/feed.xml
            git commit -m "chore(recap): daily build-in-public explainer"
            git push
            # A GITHUB_TOKEN push does NOT trigger pages.yml, so dispatch it explicitly.
            gh workflow run pages.yml
          else
            echo "Quiet day — nothing to publish."
          fi
