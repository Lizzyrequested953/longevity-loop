name: track
# Weekly frontier refresh: pull live arXiv/GitHub signal for the people + repos we
# follow, rebuild the field graph, and open a PR with what moved.
on:
  schedule:
    - cron: "0 8 * * 1" # Mondays 08:00 UTC
  workflow_dispatch: {}
permissions:
  contents: write
  pull-requests: write
jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install pyyaml
      - env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 scripts/track.py
          python3 scripts/build_graph.py
      - uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: weekly frontier refresh"
          title: "chore: weekly frontier refresh (arXiv + GitHub signal)"
          body: "Automated: refreshed data/_frontier.yml + the field graph. Review what moved and merge."
          branch: bot/frontier
          delete-branch: true
